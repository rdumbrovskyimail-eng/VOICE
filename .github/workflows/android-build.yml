name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write # 👈 Добавлено разрешение, необходимое для удаления кэша

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # 👈 ВОТ НОВЫЙ ШАГ: Принудительно удаляет весь кэш перед сборкой
      - name: Clear GitHub Actions Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Удаление старого кэша ==="
          gh cache delete --all || echo "Кэш уже пуст или не найден"

      - name: Debug a1book files
        run: |
          echo "=== Текущий коммит ==="
          git rev-parse HEAD
          echo "=== Содержимое папки a1book ==="
          find app/src/main/java/com/learnde/app/learn/sessions/a1book -type f 2>&1 || echo "ПАПКА НЕ НАЙДЕНА"
          echo "=== Полный текст A1BookSession.kt ==="
          cat app/src/main/java/com/learnde/app/learn/sessions/a1book/A1BookSession.kt 2>&1 || echo "ФАЙЛ НЕ НАЙДЕН"
          echo "=== Полный текст LearnSessionRegistry.kt ==="
          cat app/src/main/java/com/learnde/app/learn/core/LearnSessionRegistry.kt 2>&1 || echo "ФАЙЛ НЕ НАЙДЕН"
          echo "=== Полный текст A1BookRepository.kt ==="
          cat app/src/main/java/com/learnde/app/learn/sessions/a1book/A1BookRepository.kt 2>&1 || echo "ФАЙЛ НЕ НАЙДЕН"
          echo "=== Полный текст A1BookViewModel.kt ==="
          cat app/src/main/java/com/learnde/app/learn/sessions/a1book/A1BookViewModel.kt 2>&1 || echo "ФАЙЛ НЕ НАЙДЕН"

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches/modules-2
            caches/jars-9
            caches/transforms-4
            caches/build-cache-1
            wrapper/dists
            notifications
          gradle-home-cache-excludes: |
            caches/[0-9]*.[0-9]*
            caches/journal-1

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --no-build-cache \
            --rerun-tasks \
            --max-workers=4 \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m" \
            -Dandroid.enableJetifier=false

      - name: Calculate APK Size
        id: pack
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_MB=$(awk "BEGIN {printf \"%.1f\", $APK_SIZE / 1048576}")
          echo "▶ APK Size: ${APK_MB} MB"
          echo "apk_mb=$APK_MB" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }}"
          body: |
            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`
            
            🚀 **Ультра-легкая версия (работает через Cloud Gemini Live)**
            **Размер APK:** ${{ steps.pack.outputs.apk_mb }} MB
            
            **Установка:** скачайте файл `.apk` ниже и установите на телефон (распаковывать ничего не нужно!).
          files: |
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}